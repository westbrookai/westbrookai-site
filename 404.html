<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found | Westbrook AI</title>
  <meta name="description" content="The page you were looking for could not be found. Explore Westbrook AI from the homepage.">
  <meta name="robots" content="noindex,follow">
  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="alternate icon" href="/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #FAFAF8;
      --text: #1A1A18;
      --muted: #6B6B64;
      --accent: #2D5A3D;
      --accent-light: #E8F0EB;
      --border: #E2E2DC;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 960px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
      width: 100%;
    }
    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--text);
      text-decoration: none;
      letter-spacing: -0.02em;
    }
    .logo span { color: var(--accent); }
    .logo:focus {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }
    .error-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 3rem 1.5rem;
      max-width: 600px;
      margin: 0 auto;
    }
    .error-code {
      font-family: 'Playfair Display', serif;
      font-size: clamp(4rem, 12vw, 8rem);
      font-weight: 600;
      color: var(--accent);
      line-height: 1;
      margin-bottom: 1rem;
    }
    .error-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.5rem, 4vw, 2rem);
      font-weight: 600;
      margin-bottom: 1rem;
      letter-spacing: -0.02em;
    }
    .error-message {
      color: var(--muted);
      font-size: 1.125rem;
      margin-bottom: 2rem;
      line-height: 1.7;
    }
    .btn-home {
      display: inline-block;
      background: var(--accent);
      color: white;
      padding: 0.875rem 2rem;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 500;
      transition: background 0.2s, transform 0.2s;
    }
    .btn-home:hover {
      background: #234a31;
      transform: translateY(-1px);
    }
    .btn-home:focus {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }
    footer {
      max-width: 960px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
      border-top: 1px solid var(--border);
      width: 100%;
      text-align: center;
    }
    footer p {
      font-size: 0.8rem;
      color: var(--muted);
    }
    @media (max-width: 640px) {
      nav {
        padding: 1.5rem 1rem;
      }
      .error-container {
        padding: 2rem 1rem;
      }
    }
    @media (prefers-reduced-motion: reduce) {
      html { scroll-behavior: auto; }
      * { animation: none !important; transition: none !important; }
    }
  </style>
</head>
<body>
  <nav aria-label="Main navigation">
    <a href="index.html" class="logo" aria-label="Westbrook AI Home">Westbrook<span>AI</span></a>
  </nav>
  <div class="error-container">
    <div class="error-code">404</div>
    <h1 class="error-title">Page Not Found</h1>
    <p class="error-message">The page you were looking for could not be found. It might have been moved or deleted.</p>
    <a href="/" class="btn-home">Back to Home</a>
  </div>
  <footer role="contentinfo">
    <p>&copy; 2026 Westbrook AI Pty Ltd. Sydney, Australia.</p>
  </footer>
</body>
</html>
